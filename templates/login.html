<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <!-- 공통 스타일 불러오기 -->
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- =============================================
    로그인 컨테이너
  ============================================= -->
  <div class="container">

    <h2 class="page-title">로그인</h2>

    <!-- 입력 폼 영역 -->
    <div class="form-group">
      <label>이메일</label>
      <input type="email" id="email" placeholder="이메일을 입력하세요">
    </div>

    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="password" placeholder="비밀번호를 입력하세요">
    </div>

    <!-- 로그인 버튼 -->
    <button onclick="login()" class="btn btn-primary full">로그인</button>

    <!-- 회원가입 페이지로 이동 -->
    <p class="link-text">계정이 없으신가요? <a href="/register">회원가입</a></p>

  </div>


  <!-- =============================================
    로그인 JavaScript
  ============================================= -->
  <script>
    function login() {

      // 입력값 가져오기
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // 빈 값 체크
      if (!email || !password) {
        alert('이메일과 비밀번호를 입력해주세요');
        return;
      }

      // =============================================
      // POST /api/login 으로 로그인 데이터 전송
      // =============================================
      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })
      .then(res => res.json())
      .then(data => {

        if (data.message === '로그인 성공') {
          // 로그인 성공 → 서버가 발급해준 JWT 토큰을 localStorage에 저장
          // localStorage: 브라우저에 데이터를 임시 저장하는 공간
          // 앞으로 서버에 요청할 때마다 이 토큰을 같이 보낼 거다
          localStorage.setItem('token', data.token);
          localStorage.setItem('name', data.name);

          location.href = '/feed'; // 피드 페이지로 이동
        } else {
          alert(data.message); // "이메일 또는 비밀번호가 틀렸습니다"
        }
      })
      .catch(err => {
        alert('오류가 발생했습니다');
        console.error(err);
      });
    }
  </script>

</body>
</html>
