<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뉴스 피드</title>
  <!-- 공통 스타일 불러오기 -->
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- =============================================
    상단 헤더
  ============================================= -->
  <div class="header">
    <h1 class="logo">📰 뉴스 구독</h1>
    <div class="header-right">
      <!-- 로그인한 사용자 이름 표시 (JS에서 채워줌) -->
      <span id="username"></span>
      <button onclick="logout()" class="btn btn-outline">로그아웃</button>
    </div>
  </div>


  <!-- =============================================
    뉴스 카드 목록
    카드들이 여기 안에 동적으로 추가됨
  ============================================= -->
  <div class="container">
    <div id="news-list" class="news-grid">
      <!-- JS에서 뉴스 카드를 여기에 자동으로 추가 -->
    </div>
  </div>


  <!-- =============================================
    피드 JavaScript
  ============================================= -->
  <script>

    // =============================================
    // 페이지 로딩되면 바로 실행
    // =============================================
    window.onload = function () {

      // localStorage에서 토큰과 이름 꺼내기
      const token = localStorage.getItem('token');
      const name  = localStorage.getItem('name');

      // 토큰이 없으면 아직 로그인 안 한 상태 → 로그인 페이지로 이동
      if (!token) {
        alert('로그인이 필요합니다');
        location.href = '/login';
        return;
      }

      // 사용자 이름 헤더에 표시
      document.getElementById('username').textContent = name + '님';

      // 뉴스 불러오기 함수 실행 (토큰을 넘겨줌)
      loadNews(token);
    }


    // =============================================
    // GET /api/posts
    // 구독 카테고리 뉴스 불러오기
    // → 토큰을 헤더에 담아 보내면
    //    서버가 토큰을 열어보고 "누구의 뉴스를 줄지" 판단함
    // =============================================
    function loadNews(token) {

      fetch('/api/posts', {
        headers: {
          'Authorization': token  // 토큰을 Authorization 헤더에 담아 전송
        }
      })
        .then(res => {

          // 토큰이 없거나 만료되면 서버가 401을 돌려준다
          if (res.status === 401) {
            alert('로그인이 만료되었습니다. 다시 로그인해주세요.');
            localStorage.removeItem('token');
            localStorage.removeItem('name');
            location.href = '/login';
            return null; // 아래 then이 건너뛰도록 null 반환
          }

          return res.json();
        })
        .then(posts => {

          // 401 처리에서 null을 반환한 경우는 여기서 종료
          if (!posts) return;

          const newsList = document.getElementById('news-list');

          // 뉴스가 없을 때
          if (posts.length === 0) {
            newsList.innerHTML = '<p class="empty">구독한 카테고리의 뉴스가 없습니다</p>';
            return;
          }

          // 뉴스 카드 하나씩 만들어서 추가
          posts.forEach(post => {
            const card = document.createElement('div');
            card.className = 'news-card';

            // 카드 안에 들어갈 HTML
            card.innerHTML = `
              <span class="badge">${post.category}</span>
              <h3>${post.title}</h3>
              <p>${post.content}</p>
              <small>${new Date(post.created_at).toLocaleDateString()}</small>
            `;

            newsList.appendChild(card); // 목록에 카드 추가
          });
        })
        .catch(err => {
          alert('뉴스를 불러오지 못했습니다');
          console.error(err);
        });
    }


    // =============================================
    // 로그아웃
    // 저장해둔 토큰과 이름을 지우고 메인으로 이동
    // =============================================
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('name');
      location.href = '/';
    }

  </script>

</body>
</html>
